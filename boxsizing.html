<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bix-sizing</title>
</head>
<style>
    *{
        box-sizing: border-box;
    }
    div{
        height: 200px;
        width: 300px;
        background-color: brown;
        border: 4px solid orange;
        margin-bottom: 30px;
    }
      #d1{
        padding: 30px;
    }
  
        #d2{
        padding: 30px;
        box-sizing: border-box;
    }

  

</style>
<body>
    here div 
    <div id="d1">
        <h1>hello</h1>
    </div>
    <div id="d2">
                <h1>hello</h1>
    </div>
    
</body>
</html>
