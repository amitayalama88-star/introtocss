<html lang="en">
<head>

    <style>
        div{
            background-color: aqua;
            width: 100px;
            height: 100px;

        }
        span{
              background-color: aqua;
            width: 100px;
            height: 100px;

            padding: 20px;
            margin: 30px;

        }
        #d2{

        }

</head>
<body>
  <div id="d1">

      <div id="d2">

    </div>

</html>
