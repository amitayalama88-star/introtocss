<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS grid

    </title>
    <style>
        .container{
            width: 900px;
            height: 900px;
            border: 2px solid black;
            background-color: aqua;
            display: grid;
            /* grid-auto-flow: column; */
            /* grid-template-columns: 100px 200px 300px;
            grid-template-rows: 100px 200px 100px;
        } */
         grid-template-columns: 1fr 2fr 3fr;
         gap: 5px;}
        .container>.items{
            background-color: brown;
            border: 1px solid white;
            margin: 5px;
          
        }
        #items2{
            /* grid-row-start: 1;
            grid-row-end: 2; */
                    grid-row: 1/2;
                    grid-column: 2/4;
            grid-area:1/2/2/4
            /* row start column start row end column end */
            /* grid-column-start: 2;
            grid-column-end: 4; */
        }
        #items3{
            grid-row-start: 2;
            grid-row-end: 3;
            grid-column-start: 1;
            grid-column-end: 3;
        }
        #items5{
            grid-row-start: 3;
            grid-row-end: 4;
            grid-column-start: 1;
            grid-column-end: 4;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="items" id="items1">items1</div>
        <div class="items" id="items2">items2</div>
        <div class="items" id="items3">items3</div>
        <div class="items" id="items4">items4</div>
        <div class="items" id="items5">items5</div>
        <!-- <div class="items" id="items6">items6</div>
        <div class="items" id="items7">items7</div>
        <div class="items" id="items8">items8</div>
        <div class="items" id="items9">items9</div> -->
    </div>
    
</body>
</html>
