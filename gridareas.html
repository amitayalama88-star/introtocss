<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gried area practice</title>
   <style>
    .container{
        width: 100%;
        height: 600px;
        background-color: green;
        display: grid;
        grid-template-areas: "header header header" "side content1 content1" "side content2 content3""footer footer footer";

    }
    
    .items{
        border: 3px solid white;
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;

    }
    #items1{
        grid-area: header;

    }
    #items2{
        grid-area: side;

    }
    #items3{
        grid-area: content1;

    }
    #items4{
        grid-area: content2;
    }
    #items5{
        grid-area: content3;
    }
    #items6{
        grid-area: footer;
    }
    </style>
</head>
<body>
        <div class="container">
        <div class="items" id="items1"><h4>header</h4></div>
        <div class="items" id="items2"><h4>side bar</h4></div>
        <div class="items" id="items3"><h4>content1</h4></div>
        <div class="items" id="items4"><h4>content2</h4></div>
        <div class="items" id="items5"><h4>content3</h4></div>
        <div class="items" id="items6"><h4>footer</h4></div>
        
    </div>
    
</body>
</html>
